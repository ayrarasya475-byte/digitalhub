<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TikTok Downloader — DigitalHub</title>
<link rel="icon" type="image/x-icon" href="/media/favicon.ico">
<link rel="icon" type="image/jpeg" href="/media/logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400..700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#181818;--bg1:#1a1a1a;--bg2:#212121;--bg3:#2a2a2a;
    --line:#2E2E2E;--line2:#3a3a3a;
    --em:#6366f1;--em-rgb:99, 102, 241;--em2:#818cf8;
    --red:#f87171;--yellow:#fbbf24;
    --t1:#e5e5e5;--t2:#a0a0a0;--t3:#616161;
    --font:'DM Sans',system-ui,sans-serif;--rad:10px;--rs:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100vh;background:var(--bg);color:var(--t1);font-family:var(--font);font-size:13.5px;letter-spacing:-.3px}
  body{display:flex;flex-direction:column;align-items:center;padding:.5rem 1rem 3rem}
  @keyframes dotPulse{0%,80%,100%{opacity:.15;transform:scale(.75)}40%{opacity:1;transform:scale(1)}}
  .spin{display:inline-flex;gap:2.5px;align-items:center;vertical-align:middle}
  .spin>span{width:4px;height:4px;border-radius:50%;background:currentColor;animation:dotPulse 1.1s ease-in-out infinite}
  .spin>span:nth-child(2){animation-delay:.18s}.spin>span:nth-child(3){animation-delay:.36s}
  @keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .back-btn{display:inline-flex;align-items:center;gap:.35rem;font-size:.68rem;color:var(--t3);text-decoration:none;padding:.5rem 0;margin-bottom:.5rem;align-self:flex-start;width:100%;max-width:480px}
  .back-btn:hover{color:var(--t1)} .back-btn svg{width:14px;height:14px}
  .card{width:100%;max-width:480px;background:var(--bg1);border:1px solid var(--line2);border-radius:var(--rad);box-shadow:0 0 0 1px rgba(255,255,255,.03),0 8px 24px rgba(0,0,0,.5);animation:fadein .35s ease forwards}
  .c-head{padding:1rem 1.25rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.75rem}
  .c-head-icon{width:36px;height:36px;border-radius:8px;flex-shrink:0;background:var(--bg2);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center}
  .c-head-icon svg{width:18px;height:18px;color:var(--em)}
  .c-prod{font-size:.85rem;font-weight:700}.c-sub{font-size:.65rem;color:var(--t3)}
  .c-body{padding:1.25rem}
  .lbl{display:block;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:.5rem}
  .inp{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:var(--rs);padding:.7rem .85rem;font-family:var(--font);font-size:.85rem;color:var(--t1);outline:none;transition:border .15s;-webkit-appearance:none}
  .inp:focus{border-color:rgba(var(--em-rgb),.4)}.inp::placeholder{color:var(--t3)}
  .go-btn{width:100%;margin-top:.75rem;background:var(--em);border:none;border-radius:var(--rs);padding:.75rem;font-family:var(--font);font-size:.8rem;font-weight:700;color:#040d09;cursor:pointer;transition:background .18s;display:flex;align-items:center;justify-content:center;gap:.45rem}
  .go-btn:hover:not(:disabled){background:var(--em2)} .go-btn:disabled{opacity:.55;cursor:not-allowed}
  .err{font-size:.7rem;color:var(--red);margin-top:.75rem;padding:.6rem .8rem;background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.18);border-radius:var(--rs);display:none}
  .hint{font-size:.6rem;color:var(--t3);margin-top:.5rem;line-height:1.5}
  .result{margin-top:1.1rem;display:none}
  .meta{display:flex;gap:.7rem;align-items:flex-start;margin-bottom:.85rem}
  .meta img{width:46px;height:46px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
  .meta .t{font-size:.78rem;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .meta .u{font-size:.66rem;color:var(--t3);margin-top:.2rem}
  video{width:100%;border-radius:var(--rs);background:#000;display:block;max-height:62vh}
  .dlrow{display:flex;gap:.5rem;margin-top:.7rem;flex-wrap:wrap}
  .dlbtn{flex:1;min-width:130px;display:inline-flex;align-items:center;justify-content:center;gap:.4rem;background:var(--em);border:none;border-radius:var(--rs);padding:.7rem;font-family:var(--font);font-size:.74rem;font-weight:700;color:#040d09;cursor:pointer;text-decoration:none}
  .dlbtn:hover{background:var(--em2)}
  .dlbtn.alt{background:var(--bg3);color:var(--t1);border:1px solid var(--line2)}
  .dlbtn.alt:hover{border-color:rgba(var(--em-rgb),.4);color:var(--em)}
  .dlbtn svg{width:14px;height:14px}
  .slides{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem;margin-top:.3rem}
  .slide{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rs);overflow:hidden}
  .slide img{width:100%;display:block;aspect-ratio:3/4;object-fit:cover;background:var(--bg3)}
  .slide a{display:flex;align-items:center;justify-content:center;gap:.35rem;padding:.5rem;font-size:.66rem;font-weight:700;color:var(--em);text-decoration:none;border-top:1px solid var(--line)}
  .slide a:hover{background:var(--bg3)}
  .c-foot{padding:.7rem 1.25rem;text-align:center;font-size:.58rem;color:var(--t3);border-top:1px solid var(--line)}
  .notif{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--line2);border-radius:8px;padding:.6rem .9rem;font-size:.72rem;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .25s;z-index:999}
  .notif.show{opacity:1}.notif.ok{border-color:rgba(var(--em-rgb),.4);color:var(--em)}.notif.err{border-color:rgba(248,113,113,.4);color:var(--red)}
</style>
</head>
<body>

<a href="/" class="back-btn">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  Beranda
</a>

<div class="card">
  <div class="c-head">
    <div class="c-head-icon">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3a4.9 4.9 0 0 0 4.5 4.5v3a8 8 0 0 1-4.5-1.4v6.4a6 6 0 1 1-6-6c.3 0 .6 0 .9.1v3.1a3 3 0 1 0 2.1 2.9V3h3z"/></svg>
    </div>
    <div>
      <div class="c-prod">TikTok Downloader</div>
      <div class="c-sub">Video tanpa watermark · slide foto · audio</div>
    </div>
  </div>

  <div class="c-body">
    <label class="lbl" for="tkUrl">Link TikTok</label>
    <input id="tkUrl" class="inp" type="url" inputmode="url" autocomplete="off" placeholder="https://www.tiktok.com/@user/video/...  atau  vt.tiktok.com/...">
    <button id="tkGo" class="go-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="15" height="15"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
      Proses
    </button>
    <div class="hint">Tempel link video atau slide foto TikTok. Mendukung shortlink (vt/vm.tiktok.com).</div>
    <div id="tkErr" class="err"></div>

    <div id="tkResult" class="result"></div>
  </div>

  <div class="c-foot">DigitalHub · gunakan untuk konten yang kamu miliki hak aksesnya.</div>
</div>

<div class="notif" id="notif"></div>

<script>
(function(){
  'use strict';
  var $=function(i){return document.getElementById(i);};
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function notify(m,t){var n=$('notif');n.textContent=m;n.className='notif show '+(t||'');setTimeout(function(){n.className='notif';},2000);}

  fetch('/api/store-info').then(function(r){return r.json();}).then(function(j){
    if(j&&j.ok){ if(j.name)document.title='TikTok Downloader — '+j.name; if(j.color)document.documentElement.style.setProperty('--em',j.color); }
  }).catch(function(){});

  function dlUrl(u,name){ return '/api/tiktok-proxy-dl?url='+encodeURIComponent(u)+'&filename='+encodeURIComponent(name); }

  function showErr(msg){ var e=$('tkErr'); e.textContent=msg; e.style.display='block'; $('tkResult').style.display='none'; }
  function clearErr(){ $('tkErr').style.display='none'; }

  function renderVideo(d){
    var v=d.video||{}, a=d.audio||{};
    var name=(d.uploader?('tiktok_'+d.uploader):'tiktok')+'_'+Date.now();
    var html=''
      +'<div class="meta">'+(d.cover?'<img src="'+esc(d.cover)+'" alt="">':'')
        +'<div><div class="t">'+esc(d.title||'Video TikTok')+'</div>'
        +'<div class="u">@'+esc(d.uploader||'tiktok')+(d.duration?(' · '+esc(d.duration)+'s'):'')+'</div></div></div>'
      +'<video controls playsinline preload="metadata" '+(d.cover?('poster="'+esc(d.cover)+'"'):'')+' src="'+esc(v.url)+'"></video>'
      +'<div class="dlrow">'
        +'<a class="dlbtn" href="'+esc(dlUrl(v.url,name+'.mp4'))+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg> Unduh Video</a>'
        +(a.url?('<a class="dlbtn alt" href="'+esc(dlUrl(a.url,name+'.mp3'))+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg> Unduh Audio</a>'):'')
      +'</div>';
    var r=$('tkResult'); r.innerHTML=html; r.style.display='block';
  }

  function renderSlide(d){
    var a=d.audio||{};
    var base=(d.uploader?('tiktok_'+d.uploader):'tiktok')+'_'+Date.now();
    var html=''
      +'<div class="meta">'+(d.cover?'<img src="'+esc(d.cover)+'" alt="">':'')
        +'<div><div class="t">'+esc(d.title||'Slide TikTok')+'</div>'
        +'<div class="u">@'+esc(d.uploader||'tiktok')+' · '+(d.total||(d.images||[]).length)+' foto</div></div></div>'
      +'<div class="slides">'
      +(d.images||[]).map(function(im){
          return '<div class="slide"><img loading="lazy" src="'+esc(im.url)+'" alt="slide '+im.index+'">'
            +'<a href="'+esc(dlUrl(im.url,base+'_'+im.index+'.jpg'))+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="13" height="13"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg> Foto '+im.index+'</a></div>';
        }).join('')
      +'</div>'
      +(a.url?('<div class="dlrow"><a class="dlbtn alt" href="'+esc(dlUrl(a.url,base+'.mp3'))+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg> Unduh Audio</a></div>'):'');
    var r=$('tkResult'); r.innerHTML=html; r.style.display='block';
  }

  var busy=false;
  async function go(){
    if(busy)return;
    var url=$('tkUrl').value.trim();
    clearErr();
    if(!url){ showErr('Tempel link TikTok dulu.'); return; }
    if(!/tiktok\.com/.test(url)){ showErr('Itu bukan link TikTok yang valid.'); return; }
    busy=true; var btn=$('tkGo'); btn.disabled=true; btn.innerHTML='<span class="spin"><span></span><span></span><span></span></span> Memproses…';
    $('tkResult').style.display='none';
    try{
      var r=await fetch('/api/tiktok-dl?url='+encodeURIComponent(url));
      var j=await r.json();
      if(!j||!j.status){ showErr(j&&j.error?j.error:'Gagal memproses link.'); return; }
      if(j.type==='slide') renderSlide(j); else renderVideo(j);
      notify('Berhasil diproses','ok');
    }catch(e){ showErr('Koneksi bermasalah. Coba lagi.'); }
    finally{ busy=false; btn.disabled=false; btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="15" height="15"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg> Proses'; }
  }

  $('tkGo').addEventListener('click', go);
  $('tkUrl').addEventListener('keydown', function(e){ if(e.key==='Enter') go(); });
})();
</script>
<a href="/admin-panell" title="Admin Panel" style="position:fixed;bottom:14px;left:14px;z-index:40;width:38px;height:38px;border-radius:50%;background:rgba(33,33,33,.85);backdrop-filter:blur(6px);border:1px solid var(--line2,#3a3a3a);color:var(--em,#6366f1);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.35);text-decoration:none;font-size:15px;opacity:.75;transition:opacity .15s,transform .15s" aria-label="Admin Panel">🛡️</a>
</body>
</html>
