<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Toko — DigitalHub</title>
<link rel="icon" type="image/x-icon" href="/media/favicon.ico">
<link rel="icon" type="image/jpeg" href="/media/logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400..700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#181818;--bg1:#1a1a1a;--bg2:#212121;--line:#2E2E2E;--line2:#3a3a3a;
  --em:#6366f1;--em-rgb:99,102,241;--em2:#818cf8;--t1:#e5e5e5;--t2:#a0a0a0;--t3:#616161;
  --font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--t1);font-family:var(--font);letter-spacing:-.2px}
  a{color:inherit;text-decoration:none}
  header{position:sticky;top:0;z-index:20;background:rgba(24,24,24,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:1rem 1.1rem}
  header h1{font-size:1.1rem}
  header p{font-size:.72rem;color:var(--t2);margin-top:.15rem}
  .search{margin:.9rem 1.1rem 0}
  .search input{width:100%;background:var(--bg1);border:1px solid var(--line2);border-radius:10px;padding:.7rem .9rem;color:var(--t1);font-family:var(--font);font-size:.85rem}
  .list{padding:1rem 1.1rem;display:flex;flex-direction:column;gap:.6rem}
  .store-card{display:flex;align-items:center;gap:.7rem;background:var(--bg1);border:1px solid var(--line2);border-radius:12px;padding:.75rem .9rem}
  .store-card img{width:44px;height:44px;border-radius:10px;object-fit:cover;background:var(--bg2)}
  .store-info{flex:1;min-width:0}
  .store-name{font-size:.88rem;font-weight:700;display:flex;align-items:center;gap:.3rem}
  .verified-badge{color:var(--em2);font-size:.8rem}
  .store-meta{font-size:.68rem;color:var(--t3);font-family:var(--mono);margin-top:.2rem}
  .empty{text-align:center;padding:3rem 1rem;color:var(--t3);font-size:.85rem}
</style>
</head>
<body>
<header>
  <h1>🏪 Toko Reseller</h1>
  <p>Yang udah sering dibeli orang, kita taruh duluan</p>
</header>
<div class="search"><input id="q" placeholder="Cari nama toko..." oninput="render()"></div>
<div class="list" id="list"></div>

<script>
var STORES=[];
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function render(){
  var q=document.getElementById('q').value.toLowerCase();
  var filtered=STORES.filter(function(s){return s.storeName.toLowerCase().indexOf(q)!==-1;});
  var list=document.getElementById('list');
  if(!filtered.length){ list.innerHTML='<div class="empty">Belum ada toko yang cocok.</div>'; return; }
  list.innerHTML=filtered.map(function(s){
    return '<a class="store-card" href="/market?reseller='+encodeURIComponent(s.slug)+'">'+
      '<img src="'+(s.logo||'/media/logo.jpg')+'" alt="">'+
      '<div class="store-info">'+
        '<div class="store-name">'+esc(s.storeName)+(s.verified?' <span class="verified-badge">✓</span>':'')+'</div>'+
        '<div class="store-meta">'+s.totalOrders+' transaksi</div>'+
      '</div></a>';
  }).join('');
}
fetch('/api/stores').then(function(r){return r.json();}).then(function(j){
  if(j.ok){ STORES=j.stores; render(); }
}).catch(function(){
  document.getElementById('list').innerHTML='<div class="empty">Gagal memuat daftar toko.</div>';
});
</script>

    <span>Beranda</span>
  </a>
  <a href="/toko" data-nav="toko">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l1.5-5h15L21 9"/><path d="M3 9v10a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V9"/><path d="M3 9h18M9 21v-5h6v5"/></svg>
    <span>Toko</span>
  </a>
  <a href="/ai" data-nav="ai">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3M12 18v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M3 12h3M18 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/><circle cx="12" cy="12" r="3.2"/></svg>
    <span>Asisten</span>
  </a>
  <a href="/ulasan" data-nav="testimoni">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 2 2.9 6.3L21 9l-4.6 4.5L17.5 21 12 17.8 6.5 21l1.1-7.5L3 9l6.1-.7z"/></svg>
    <span>Ulasan</span>
  </a>
  <a href="/profil" data-nav="profil">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.5"/><path d="M4.5 20c1.4-3.6 4.4-5.5 7.5-5.5s6.1 1.9 7.5 5.5"/></svg>
    <span>Akun</span>
  </a>
</nav>
<style>
.dh-bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;background:rgba(24,24,24,.94);backdrop-filter:blur(12px);border-top:1px solid #2E2E2E;padding:.35rem .3rem calc(.35rem + env(safe-area-inset-bottom))}
.dh-bottomnav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.22rem;color:#71717a;text-decoration:none;font-size:.6rem;font-family:'DM Sans',system-ui,sans-serif;padding:.4rem .2rem;border-radius:12px;transition:color .15s,background .15s}
.dh-bottomnav a svg{width:21px;height:21px;transition:transform .15s}
.dh-bottomnav a.active{color:#818cf8;background:rgba(99,102,241,.1)}
.dh-bottomnav a.active svg{transform:translateY(-1px)}
body{padding-bottom:68px !important}
</style>
<script>
(function(){
  var path=location.pathname;
  var map={'/':'dashboard','/toko':'toko','/ai':'ai','/ulasan':'testimoni','/profil':'profil'};
  var active=map[path];
  document.querySelectorAll('#dhBottomNav a').forEach(function(a){
    if(a.dataset.nav===active) a.classList.add('active');
  });
})();
</script>
<a href="/admin-panell" title="Admin Panel" style="position:fixed;bottom:78px;left:14px;z-index:40;width:38px;height:38px;border-radius:50%;background:rgba(33,33,33,.85);backdrop-filter:blur(6px);border:1px solid #3a3a3a;color:#6366f1;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.35);text-decoration:none;font-size:15px;opacity:.75" aria-label="Admin Panel">🛡️</a>
</body>
</html>
