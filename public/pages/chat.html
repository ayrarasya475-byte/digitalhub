<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="/media/favicon.ico">
<link rel="icon" type="image/jpeg" href="/media/logo.jpg">
<link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='36' fill='%23080808'/%3E%3Ctext x='90' y='90' dominant-baseline='central' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='700' font-size='100' fill='%236366f1'%3ED%3C/text%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
<meta name="theme-color" content="#181818">
<meta name="description" content="Chat Komunitas — DigitalHub">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Chat — DigitalHub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#181818;--bg1:#1a1a1a;--bg2:#212121;--bg3:#2a2a2a;--bg4:#313131;
  --line:#2E2E2E;--line2:#3a3a3a;--line3:#484848;
  --em:#6366f1;--em2:#818cf8;--em-rgb:99, 102, 241;
  --sky:#38bdf8;--sky-rgb:56,189,248;
  --yel:#fbbf24;--yel-rgb:251,191,36;
  --red:#f87171;--red-rgb:248,113,113;
  --pur:#a78bfa;--pur-rgb:167,139,250;
  --t1:#e5e5e5;--t2:#a0a0a0;--t3:#616161;--t4:rgba(255,255,255,.07);
  --mono:'Ubuntu Mono',monospace;--font:'DM Sans',system-ui,sans-serif;
  --rad:4px;--rs:4px;
  --trans:.18s cubic-bezier(.4,0,.2,1);
  --nav-h:54px;
  --input-h:64px;
}
html,body{
  height:100%;
  background:var(--bg);color:var(--t1);font-family:var(--font);font-size:13.5px;
  overflow:hidden;
}
body{
  display:flex;flex-direction:column;
  background-color:#181818;
  background-image:
    linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);
  background-size:40px 40px;
}

.toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%) translateY(-16px);display:flex;align-items:center;gap:.55rem;padding:.7rem 1.2rem .7rem .8rem;border-radius:4px;font-size:.8rem;font-weight:700;z-index:9999;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;max-width:92vw;backdrop-filter:blur(12px);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:rgba(24,24,24,.97);border:1.5px solid rgba(var(--em-rgb),.5);color:var(--em)}
.toast.err{background:rgba(24,24,24,.97);border:1.5px solid rgba(var(--red-rgb),.5);color:var(--red)}
.toast.warn{background:rgba(24,24,24,.97);border:1.5px solid rgba(var(--yel-rgb),.4);color:var(--yel)}
.toast.info{background:rgba(24,24,24,.97);border:1.5px solid rgba(255,255,255,.15);color:var(--t1)}
.t-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.toast.ok .t-icon{background:rgba(var(--em-rgb),.18)}
.toast.err .t-icon{background:rgba(var(--red-rgb),.18)}
.toast.warn .t-icon{background:rgba(var(--yel-rgb),.15)}

.nav{
  height:var(--nav-h);flex-shrink:0;
  background:rgba(24,24,24,.95);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:.6rem;
  padding:0 1rem;
  z-index:50;
  position:relative;
}
.nav-logo{font-size:.82rem;font-weight:700;color:var(--em);display:flex;align-items:center;gap:.45rem;text-decoration:none}
.nav-gem{width:26px;height:26px;border-radius:4px;background:linear-gradient(135deg,rgba(var(--em-rgb),.15),rgba(0,100,200,.15));border:1px solid rgba(var(--em-rgb),.3);display:flex;align-items:center;justify-content:center;box-shadow:0 0 14px rgba(var(--em-rgb),.15)}
.nav-gem svg{width:12px;height:12px}
.nav-title{font-size:.78rem;font-weight:700;color:var(--t1)}
.nav-sub{font-size:.58rem;color:var(--t3);display:flex;align-items:center;gap:.3rem}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--em);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(var(--em-rgb),.4)}70%{box-shadow:0 0 0 6px rgba(var(--em-rgb),0)}100%{box-shadow:0 0 0 0 rgba(var(--em-rgb),0)}}
.nav-r{display:flex;align-items:center;gap:.4rem;margin-left:auto}
.nav-btn{font-size:.65rem;font-weight:600;color:var(--t3);background:none;border:1px solid var(--line);border-radius:4px;padding:.28rem .65rem;cursor:pointer;font-family:var(--font);transition:all var(--trans);white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem}
.nav-btn:hover{color:var(--t1);border-color:var(--line2)}
.nav-btn.em{color:var(--em);border-color:rgba(var(--em-rgb),.3);background:rgba(var(--em-rgb),.07)}

.msgs-area{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:.75rem 1rem;
  display:flex;
  flex-direction:column;
  gap:.35rem;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}

.msgs-area::-webkit-scrollbar{width:4px}
.msgs-area::-webkit-scrollbar-track{background:transparent}
.msgs-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

.date-divider{
  display:flex;align-items:center;gap:.5rem;
  margin:.5rem 0;
}
.date-divider span{
  font-size:.58rem;font-weight:600;color:var(--t4);white-space:nowrap;
  background:rgba(255,255,255,.03);border:1px solid var(--line);
  border-radius:4px;padding:.12rem .65rem;
}
.date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:var(--line);}

.msg-row{
  display:flex;align-items:flex-end;gap:.5rem;
  animation:msgIn .22s cubic-bezier(.34,1.2,.64,1) both;
}
@keyframes msgIn{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}
.msg-row.mine{flex-direction:row-reverse;}
.msg-row.mine .msg-bubble{
  background:linear-gradient(135deg,rgba(var(--em-rgb),.18),rgba(var(--em-rgb),.12));
  border:1px solid rgba(var(--em-rgb),.25);
  border-bottom-right-radius:4px;
  color:var(--t1);
}
.msg-row:not(.mine) .msg-bubble{
  background:var(--bg2);
  border:1px solid var(--line);
  border-bottom-left-radius:4px;
}
.msg-avatar{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:800;color:var(--em);
  flex-shrink:0;text-transform:uppercase;
  border:1.5px solid rgba(var(--em-rgb),.2);
  background:rgba(var(--em-rgb),.1);
  user-select:none;
  align-self:flex-end;
  margin-bottom:2px;
}
.msg-bubble{
  max-width:min(340px,72vw);
  border-radius:4px;
  padding:.55rem .75rem;
  position:relative;
  word-break:break-word;
  overflow-wrap:break-word;
}
.msg-name{
  font-size:.6rem;font-weight:700;
  color:var(--em);margin-bottom:.2rem;
}
.msg-row.mine .msg-name{display:none;}
.msg-text{font-size:.8rem;color:var(--t1);line-height:1.5;}
.msg-photo{
  width:100%;max-width:240px;border-radius:4px;
  border:1px solid var(--line);cursor:zoom-in;
  display:block;margin-bottom:.3rem;
  object-fit:cover;max-height:200px;
  transition:transform .15s;
}
.msg-photo:hover{transform:scale(1.01);}
.msg-meta{
  display:flex;align-items:center;justify-content:flex-end;gap:.3rem;
  margin-top:.25rem;
}
.msg-time{font-size:.57rem;color:var(--t3);}
.msg-del{
  background:none;border:none;cursor:pointer;
  color:var(--t4);font-size:.6rem;padding:.1rem .3rem;
  border-radius:4px;font-family:var(--font);
  transition:all var(--trans);
  line-height:1;
}
.msg-del:hover{color:var(--red);background:rgba(var(--red-rgb),.08);}

.scroll-btn{
  position:absolute;bottom:calc(var(--input-h) + .6rem);
  right:1.2rem;
  width:34px;height:34px;border-radius:50%;
  background:var(--bg2);border:1px solid var(--line2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:10;
  opacity:0;transform:translateY(6px);
  transition:all .2s;
  pointer-events:none;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.scroll-btn.show{opacity:1;transform:none;pointer-events:all;}
.scroll-btn svg{width:14px;height:14px;color:var(--t2)}
.unread-badge{
  position:absolute;top:-3px;right:-3px;
  width:16px;height:16px;border-radius:50%;
  background:var(--em);color:#04110a;
  font-size:.55rem;font-weight:800;
  display:none;align-items:center;justify-content:center;
}
.unread-badge.show{display:flex;}

.input-wrap{
  flex-shrink:0;
  background:rgba(24,24,15,.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--line);
  padding:.55rem .75rem;
  padding-bottom:max(.55rem, env(safe-area-inset-bottom));
  position:relative;
  #musicPlayer {
    bottom: calc(1.15rem + env(safe-area-inset-bottom)) !important;
  }
}

.inp-photo-pre{
  display:none;
  background:var(--bg2);border:1px solid var(--line);
  border-radius:4px;padding:.5rem .65rem;
  margin-bottom:.45rem;
  align-items:center;gap:.65rem;
}
.inp-photo-pre.show{display:flex;}
.inp-photo-pre img{width:48px;height:48px;object-fit:cover;border-radius:4px;border:1px solid var(--line2)}
.inp-photo-pre-info{flex:1;min-width:0}
.inp-photo-pre-name{font-size:.65rem;font-weight:600;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inp-photo-pre-sub{font-size:.58rem;color:var(--t3)}
.inp-photo-pre-rm{background:none;border:none;cursor:pointer;color:var(--t3);padding:.2rem;transition:color .15s;flex-shrink:0;}
.inp-photo-pre-rm:hover{color:var(--red);}

.input-row{display:flex;align-items:flex-end;gap:.5rem;}

.photo-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--bg2);border:1px solid var(--line2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all var(--trans);
  position:relative;overflow:hidden;
}
.photo-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:100px;}
.photo-btn:hover{border-color:rgba(var(--em-rgb),.3);background:rgba(var(--em-rgb),.06);}
.photo-btn svg{width:16px;height:16px;color:var(--t3);pointer-events:none;}
.photo-btn.loaded{border-color:rgba(var(--em-rgb),.4);background:rgba(var(--em-rgb),.1);}
.photo-btn.loaded svg{color:var(--em);}

.inp-box{
  flex:1;
  background:var(--bg2);border:1px solid var(--line);
  border-radius:4px;
  padding:.6rem .9rem;
  color:var(--t1);font-family:var(--font);font-size:.82rem;
  outline:none;resize:none;
  line-height:1.45;min-height:38px;max-height:130px;
  overflow-y:auto;overflow-x:hidden;
  transition:border-color var(--trans),box-shadow var(--trans);
  scrollbar-width:none;
}
.inp-box::-webkit-scrollbar{display:none;}
.inp-box:focus{border-color:rgba(var(--em-rgb),.3);box-shadow:0 0 0 3px rgba(var(--em-rgb),.07);}
.inp-box::placeholder{color:var(--t4);}
.inp-box.uploading{border-color:rgba(var(--yel-rgb),.3);}

.send-btn{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--em),#818cf8);
  border:none;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--trans);box-shadow:0 3px 12px rgba(var(--em-rgb),.3);
}
.send-btn:hover:not(:disabled){transform:scale(1.07);box-shadow:0 5px 18px rgba(var(--em-rgb),.4);}
.send-btn:active:not(:disabled){transform:scale(.96);}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none;}
.send-btn svg{width:15px;height:15px;color:#04110a;}

.login-bar{
  flex-shrink:0;
  background:rgba(24,24,15,.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--line);
  padding:.65rem 1rem;
  padding-bottom:max(.65rem, env(safe-area-inset-bottom));
  display:flex;align-items:center;gap:.75rem;
  display:none;
}
.login-bar.show{display:flex;}
.lb-text{font-size:.75rem;color:var(--t3);flex:1;}
.lb-text strong{color:var(--t1);}
.lb-login-btn{
  font-size:.7rem;font-weight:700;
  padding:.4rem .9rem;border-radius:4px;
  border:none;background:linear-gradient(135deg,var(--em),#818cf8);
  color:#04110a;cursor:pointer;font-family:var(--font);
  transition:all var(--trans);white-space:nowrap;flex-shrink:0;
}
.lb-login-btn:hover{transform:translateY(-1px);}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:flex-end;justify-content:center;padding:0;backdrop-filter:blur(8px)}
.modal-bg.on{display:flex;animation:bgIn .2s ease}
@keyframes bgIn{from{opacity:0}to{opacity:1}}
.modal{width:100%;max-width:480px;background:var(--bg1);border:1px solid var(--line2);border-radius:4px 22px 0 0;padding:1.5rem 1.4rem 2.5rem;box-shadow:0 -20px 80px rgba(0,0,0,.9);animation:modalUp .3s cubic-bezier(.34,1.2,.64,1)}
@keyframes modalUp{from{transform:translateY(100%)}to{transform:none}}
.modal-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.12);margin:0 auto .9rem}
.modal-title{font-size:.95rem;font-weight:700;margin-bottom:.25rem}
.modal-sub{font-size:.7rem;color:var(--t3);margin-bottom:1.1rem}
.modal-tabs{display:flex;gap:.3rem;margin-bottom:1rem;background:var(--bg2);border-radius:4px;padding:.25rem}
.modal-tab{flex:1;padding:.38rem;border:none;border-radius:4px;background:none;font-family:var(--font);font-size:.7rem;font-weight:600;color:var(--t3);cursor:pointer;transition:all var(--trans)}
.modal-tab.on{background:var(--bg3);color:var(--t1)}
.f-label{font-size:.57rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);display:block;margin-bottom:.3rem}
.f-inp{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:var(--rs);padding:.6rem .85rem;color:var(--t1);font-family:var(--font);font-size:.8rem;outline:none;transition:border-color var(--trans),box-shadow var(--trans)}
.f-inp:focus{border-color:rgba(var(--em-rgb),.35);box-shadow:0 0 0 3px rgba(var(--em-rgb),.08)}
.f-inp::placeholder{color:var(--t4)}
.mb{margin-bottom:.65rem}
.btn-em{width:100%;font-family:var(--font);font-size:.78rem;font-weight:700;padding:.7rem;border-radius:var(--rs);cursor:pointer;transition:all var(--trans);background:#4f46e5;color:#fff;border:1px solid #4f46e5;display:flex;align-items:center;justify-content:center;gap:.4rem}
.btn-em:hover:not(:disabled){cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{width:100%;font-family:var(--font);font-size:.75rem;font-weight:600;padding:.62rem;border-radius:var(--rs);border:1px solid #3f3f46;background:#27272a;color:#d4d4d8;cursor:pointer;transition:all var(--trans)}
.btn-ghost:hover{border-color:#52525b;background:#3f3f46}
.err-box{background:rgba(var(--red-rgb),.07);border:1px solid rgba(var(--red-rgb),.2);border-radius:var(--rs);padding:.5rem .75rem;font-size:.7rem;color:var(--red);margin-bottom:.65rem;display:none}
.err-box.show{display:block}

.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem}
.lightbox.on{display:flex}
.lightbox img{max-width:100%;max-height:90vh;border-radius:4px;object-fit:contain}
.lb-close{position:fixed;top:1.2rem;right:1.2rem;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:var(--t1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;z-index:501;transition:background .15s}
.lb-close:hover{background:rgba(255,255,255,.2)}

.chat-empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2rem 1rem;color:var(--t3);
}
.chat-empty-icon{font-size:2.5rem;margin-bottom:.75rem;opacity:.4}
.chat-empty-title{font-size:.85rem;font-weight:700;color:var(--t2);margin-bottom:.3rem}
.chat-empty-sub{font-size:.7rem;line-height:1.6}

.skel-msg{height:48px;border-radius:4px;background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;margin-bottom:.35rem}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.typing-indicator{
  display:flex;align-items:center;gap:.3rem;
  padding:.4rem .7rem;
  background:var(--bg2);border:1px solid var(--line);border-radius:4px;
  width:fit-content;display:none;
}
.typing-indicator.show{display:flex;}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:typingDot 1.4s infinite ease-in-out both;}
.typing-dot:nth-child(1){animation-delay:0s}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingDot{0%,80%,100%{transform:scale(0.6);opacity:.4}40%{transform:scale(1);opacity:1}}

@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite;display:inline-block;line-height:1}

/* ── Global UI Refinement v7.2 ─────────────────────────────────── */

/* --- Compact, refined buttons --- */
button, .btn, .n-btn, .nav-btn, .snav-btn, .tb-btn, .tb-f,
.act-btn, .pf-cat, .chip, .cat, .tag-btn, .filter-btn {
  font-size: .67rem !important;
  letter-spacing: -.01em;
  transition: all .15s ease !important;
}

/* Primary action buttons: smaller but still prominent */
.btn-em, .l-btn, .submit-btn, .free-claim-btn, .buy-btn, .order-btn {
  font-size: .73rem !important;
  padding: .5rem .95rem !important;
  letter-spacing: -.01em;
  border-radius: 5px !important;
}

/* Nav bar tighter */
.nav-inner, .nav-wrap { height: 46px !important; }

/* Inputs slimmer */
.l-inp, .f-inp, .finp, .ph-inp, .pf-input,
.cnt-search, .srv-search, .tb-search, .prod-search,
.dr-inp, .dp-inp, .chat-inp, .msg-inp {
  font-size: .73rem !important;
  padding: .48rem .72rem !important;
}

/* Cards: lighter shadow, crisper */
.sc, .card, .prod-card, .srv-card, .rv-card, .dl-card,
.ord-card, .dep-card, .notif-item {
  box-shadow: 0 1px 5px rgba(0,0,0,.2) !important;
  transition: box-shadow .15s ease, transform .15s ease !important;
}
.sc:hover, .card:hover, .prod-card:hover, .srv-card:hover {
  box-shadow: 0 4px 16px rgba(0,0,0,.3) !important;
  transform: translateY(-1px) !important;
}

/* Toasts smaller */
.toast { font-size: .7rem !important; padding: .55rem .85rem !important; }

/* Skeleton shimmer smoother */
.skeleton, .skel { animation-duration: 1.6s !important; }

/* Scrollbars thin and subtle */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.22); }

/* Mobile overrides */
@media (max-width: 680px) {
  .main, .page, .main-wrap {
    padding-left: .85rem !important;
    padding-right: .85rem !important;
  }
  .btn-em, .l-btn, .submit-btn {
    font-size: .7rem !important;
    padding: .48rem .85rem !important;
  }
  .n-btn, .nav-btn, .snav-btn {
    height: 30px !important;
    font-size: .64rem !important;
    padding: 0 .65rem !important;
  }
  /* Drawer links more compact */
  .dr-link, .snav-dr-link {
    padding: .55rem .7rem !important;
    font-size: .72rem !important;
    min-height: 36px !important;
    border-radius: 5px !important;
  }
  /* Section headers tighter */

<script>
(function(){
  function snavToggle(){
    var d=document.getElementById('snavDrawer'),b=document.getElementById('snavBackdrop'),h=document.getElementById('snavHbg');
    var isOpen=d.classList.contains('open');
    if(isOpen){d.classList.remove('open');b.classList.remove('open');h.classList.remove('open');document.body.style.overflow='';}
    else{d.classList.add('open');b.classList.add('open');h.classList.add('open');document.body.style.overflow='hidden';}
  }
  function snavClose(){
    var d=document.getElementById('snavDrawer'),b=document.getElementById('snavBackdrop'),h=document.getElementById('snavHbg');
    d.classList.remove('open');b.classList.remove('open');h.classList.remove('open');document.body.style.overflow='';
  }
  window.snavToggle=snavToggle;window.snavClose=snavClose;
  document.addEventListener('keydown',function(e){if(e.key==='Escape')snavClose();});
  // Apply store settings to nav
  fetch('/api/products').then(function(r){return r.json();}).then(function(j){
    if(!j)return;
    var name=j.store||(j.settings&&j.settings.storeName)||'';
    if(name){
      var el=document.getElementById('snavName');if(el)el.textContent=name;
      document.querySelectorAll('.js-store-name,[data-store-name]').forEach(function(el){el.textContent=name;});
    }
    var wa=j.wa||(j.settings&&j.settings.wa)||'';
    if(wa){
      var wb=document.getElementById('snavWaBtn');if(wb)wb.href=wa;
      var wl=document.getElementById('snavWaLink');if(wl)wl.href=wa;
    }
    var ch=j.channel||(j.settings&&(j.settings.channelWa||j.settings.channel))||'';
    if(ch)document.querySelectorAll('[data-channel-link]').forEach(function(el){el.href=ch;el.style.display=''});
    var pc=(j.settings&&j.settings.primaryColor)||'';
    if(pc){
      function hexRgb(h){h=h.replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];return parseInt(h.slice(0,2),16)+','+parseInt(h.slice(2,4),16)+','+parseInt(h.slice(4,6),16);}
      document.documentElement.style.setProperty('--em',pc);
      document.documentElement.style.setProperty('--em2',pc);
      document.documentElement.style.setProperty('--em-rgb',hexRgb(pc));
      document.documentElement.setAttribute('data-em',pc);
      var _tmeta=document.querySelector('meta[name="theme-color"]');if(_tmeta)_tmeta.setAttribute('content',pc);
    }
    if(j.settings){applyGlobalBg(j.settings);applyMusicSettings(j.settings);}
  }).catch(function(){});
})();
function applyGlobalBg(s) {
  var old = document.getElementById('_gbg'); if (old) old.remove();
  var oldStyle = document.getElementById('_gbg_style'); if (oldStyle) oldStyle.remove();
  if (!s || !s.bgUrl) return;
  var op = s.bgOpacity != null ? parseFloat(s.bgOpacity) : 0.15;
  var el = document.createElement('div');
  el.id = '_gbg';
  el.setAttribute('aria-hidden','true');
  el.style.cssText = 'position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;will-change:transform;transform:translateZ(0)';
  if (s.bgType === 'video') {
    var v = document.createElement('video');
    v.src = s.bgUrl; v.autoplay = true; v.loop = true; v.muted = true; v.playsInline = true;
    v.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:'+op+';transform:translateZ(0)';
    el.appendChild(v);
  } else {
    var img = document.createElement('div');
    img.style.cssText = 'position:absolute;inset:0;background-image:url('+JSON.stringify(s.bgUrl)+');background-size:cover;background-position:center;opacity:'+op+';transform:translateZ(0)';
    el.appendChild(img);
  }
  document.body.insertBefore(el, document.body.firstChild);
  // Override body background agar tidak menutupi _gbg
  var st = document.createElement('style');
  st.id = '_gbg_style';
  st.textContent = 'html{background:var(--bg0,var(--bg,#0e0e0e))!important}body{background-color:transparent!important;background-image:none!important;}';
  document.head.appendChild(st);
}
</script>

  const el=document.getElementById('toast'),ti=document.getElementById('tIcon'),tm=document.getElementById('tMsg');
  const ico={ok:'✓',err:'✕',warn:'!',info:'i'};
  el.className='toast '+type;ti.textContent=ico[type]||'•';tm.textContent=msg;
  el.classList.add('on');clearTimeout(_tTimer);
  if(dur>0) _tTimer=setTimeout(()=>el.classList.remove('on'),dur);
}

const msgsArea=document.getElementById('msgsArea');
msgsArea.addEventListener('scroll',()=>{
  const threshold=80;
  const nearBottom=msgsArea.scrollHeight-msgsArea.scrollTop-msgsArea.clientHeight<threshold;
  _atBottom=nearBottom;
  const scrollBtn=document.getElementById('scrollBtn');
  if(nearBottom){
    scrollBtn.classList.remove('show');
    _unreadCount=0;
    document.getElementById('unreadBadge').classList.remove('show');
  }else{
    if(_messages.length>0) scrollBtn.classList.add('show');
  }
});

function scrollToBottom(smooth=false){
  const a=msgsArea;
  if(smooth) a.scrollTo({top:a.scrollHeight,behavior:'smooth'});
  else a.scrollTop=a.scrollHeight;
  _unreadCount=0;
  document.getElementById('unreadBadge').classList.remove('show');
  document.getElementById('scrollBtn').classList.remove('show');
  _atBottom=true;
}

function _handleAuthFail(){
  _token='';_username='';_adminToken='';
  localStorage.removeItem('userApiKey');localStorage.removeItem('userToken');localStorage.removeItem('username');
  initAuth();
  toast('Sesi habis, silakan login ulang.','err',4000);

}

async function sendMessage(){
  if(_uploading){toast('Tunggu foto selesai diupload','warn');return}
  const inpBox=document.getElementById('inpBox');
  const text=inpBox.value.trim();
  const photo=_uploadedUrl;
  if(!text&&!photo){return}
  if(!_token){location.href='/login?returnUrl=/chat';return}

  const btn=document.getElementById('sendBtn');
  btn.disabled=true;
  try{
    const r=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':_token},
      body:JSON.stringify({text,photoUrl:photo,displayName:_username})
    });
    if(r.status===401){_handleAuthFail();return}
    const j=await r.json();
    if(!j.ok){toast(j.message||'Gagal mengirim','err');return}
    inpBox.value='';inpBox.style.height='auto';
    removePhoto();

    if(j.message) addMessage(j.message,true);
    scrollToBottom(true);
  }catch(e){toast('Error: '+e.message,'err');}
  finally{btn.disabled=false;inpBox.focus();}
}

const AVATAR_COLORS=['--em-rgb','--sky-rgb','--pur-rgb','--yel-rgb'];

function getAvatarColor(name){
  const idx=name.charCodeAt(0)%AVATAR_COLORS.length;
  return AVATAR_COLORS[idx];
}

function addMessage(msg,isNew=false){

  if(_messages.find(m=>m.id===msg.id)) return;
  _messages.push(msg);
  if(msg.createdAt>_lastTs) _lastTs=msg.createdAt;

  const area=document.getElementById('msgsArea');
  const isMine=msg.username===_username;

  const prev=_messages[_messages.length-2];
  if(!prev || !sameDay(prev.createdAt,msg.createdAt)){
    const div=document.createElement('div');
    div.className='date-divider';
    div.innerHTML=`<span>${fmtDate(msg.createdAt)}</span>`;
    area.appendChild(div);
  }

  const row=document.createElement('div');
  row.className='msg-row'+(isMine?' mine':'');
  row.dataset.id=msg.id;
  row.style.animationDelay=isNew?'0s':'0.02s';

  const aCol=getAvatarColor(msg.username);
  const initials=(msg.displayName||msg.username||'?').charAt(0).toUpperCase();
  const photo=msg.photoUrl?`<img class="msg-photo" src="${esc(msg.photoUrl)}" alt="Foto" onclick="openLightbox('${esc(msg.photoUrl)}')" loading="lazy">`:'';
  const textHtml=msg.text?`<div class="msg-text">${esc(msg.text)}</div>`:'';
  const canDel=(isMine||_adminToken)?`<button class="msg-del" onclick="deleteMessage('${esc(msg.id)}',this)">✕</button>`:'';

  row.innerHTML=`
    ${!isMine?`<div class="msg-avatar" style="background:rgba(var(${aCol}),.1);border-color:rgba(var(${aCol}),.3);color:var(${aCol})">${initials}</div>`:''}
    <div class="msg-bubble">
      ${!isMine?`<div class="msg-name">${esc(msg.displayName||msg.username)}</div>`:''}
      ${photo}
      ${textHtml}
      <div class="msg-meta">
        <span class="msg-time">${fmtTime(msg.createdAt)}</span>
        ${canDel}
      </div>
    </div>
  `;
  area.appendChild(row);

  if(isNew&&!_atBottom){
    _unreadCount++;
    const badge=document.getElementById('unreadBadge');
    badge.textContent=_unreadCount>99?'99+':_unreadCount;
    badge.classList.add('show');
    document.getElementById('scrollBtn').classList.add('show');
  }
}

function renderMessages(msgs){
  const area=document.getElementById('msgsArea');
  area.innerHTML='';
  _messages=[];
  _lastTs=0;

  if(!msgs||msgs.length===0){
    area.innerHTML=`<div class="chat-empty">
      <div class="chat-empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32" style="color:var(--t3)"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
      <div class="chat-empty-title">Belum ada pesan</div>
      <div class="chat-empty-sub">Jadilah yang pertama memulai obrolan!</div>
    </div>`;
    return;
  }

  msgs.forEach(m=>{
    _messages.push(m);
    if(m.createdAt>_lastTs) _lastTs=m.createdAt;
  });

  let lastDay='';
  msgs.forEach(msg=>{
    const day=fmtDate(msg.createdAt);
    if(day!==lastDay){
      const div=document.createElement('div');
      div.className='date-divider';
      div.innerHTML=`<span>${day}</span>`;
      area.appendChild(div);
      lastDay=day;
    }
    const isMine=msg.username===_username;
    const aCol=getAvatarColor(msg.username);
    const initials=(msg.displayName||msg.username||'?').charAt(0).toUpperCase();
    const photo=msg.photoUrl?`<img class="msg-photo" src="${esc(msg.photoUrl)}" alt="Foto" onclick="openLightbox('${esc(msg.photoUrl)}')" loading="lazy">`:'';
    const textHtml=msg.text?`<div class="msg-text">${esc(msg.text)}</div>`:'';
    const canDel=(isMine||_adminToken)?`<button class="msg-del" onclick="deleteMessage('${esc(msg.id)}',this)">✕</button>`:'';
    const row=document.createElement('div');
    row.className='msg-row'+(isMine?' mine':'');
    row.dataset.id=msg.id;
    row.innerHTML=`
      ${!isMine?`<div class="msg-avatar" style="background:rgba(var(${aCol}),.1);border-color:rgba(var(${aCol}),.3);color:var(${aCol})">${initials}</div>`:''}
      <div class="msg-bubble">
        ${!isMine?`<div class="msg-name">${esc(msg.displayName||msg.username)}</div>`:''}
        ${photo}
        ${textHtml}
        <div class="msg-meta">
          <span class="msg-time">${fmtTime(msg.createdAt)}</span>
          ${canDel}
        </div>
      </div>
    `;
    area.appendChild(row);
  });
}

async function deleteMessage(id, btn){
  if(!_token) return;
  btn.disabled=true;
  try{
    const headers={'x-api-key':_token};
    if(_adminToken) headers['x-admin-token']=_adminToken;
    const r=await fetch('/api/chat/'+id,{method:'DELETE',headers});
    if(r.status===401){_handleAuthFail();return}
    const j=await r.json();
    if(j.ok){
      const row=document.querySelector('.msg-row[data-id="'+id+'"]');
      if(row){row.style.opacity='0';row.style.transform='scale(.95)';row.style.transition='all .2s';setTimeout(()=>row.remove(),200);}
      _messages=_messages.filter(m=>m.id!==id);
    }else toast(j.message||'Gagal menghapus','err');
  }catch(e){toast('Error','err');}
  finally{if(btn)btn.disabled=false;}
}

async function loadInitial(){
  try{
    const r=await fetch('/api/chat?limit=50');
    const j=await r.json();
    if(!j.ok)throw new Error(j.message);
    renderMessages(j.messages||[]);
    scrollToBottom(false);
    updateOnlineCount(j.total||0);
  }catch(e){
    const area=document.getElementById('msgsArea');
    area.innerHTML=`<div class="chat-empty"><div class="chat-empty-icon">⚠️</div><div class="chat-empty-title">Gagal memuat</div><div class="chat-empty-sub">${esc(e.message)}</div></div>`;
  }
}

async function pollNew(){
  try{
    if(_lastTs===0) return;
    const r=await fetch('/api/chat?since='+_lastTs+'&limit=20');
    const j=await r.json();
    if(!j.ok) return;
    const newMsgs=j.messages||[];
    newMsgs.forEach(m=>addMessage(m,true));
    if(newMsgs.length>0&&_atBottom) scrollToBottom(false);
    updateOnlineCount(j.total||0);

    const empty=document.querySelector('.chat-empty');
    if(empty&&newMsgs.length>0) empty.remove();
  }catch(e){}
}

function updateOnlineCount(total){
  const el=document.getElementById('onlineCount');
  if(!el) return;
  if(total>0) el.textContent=total+' pesan';
  else el.textContent='Live';
}

function startPolling(){
  if(_pollTimer) clearInterval(_pollTimer);
  _pollTimer=setInterval(pollNew,3000);
}

function sameDay(a,b){
  return new Date(a).toDateString()===new Date(b).toDateString();
}
function fmtDate(ts){
  const d=new Date(ts);
  const today=new Date();
  const yesterday=new Date(today-86400000);
  if(d.toDateString()===today.toDateString()) return 'Hari Ini';
  if(d.toDateString()===yesterday.toDateString()) return 'Kemarin';
  return d.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long'});
}
function fmtTime(ts){
  return new Date(ts).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
}
function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

(function connectStoreSSE() {
  try {
    var _src = new EventSource('/api/store/stream');
    _src.onmessage = function(e) {
      try {
        var d = JSON.parse(e.data);
        if (d.type === 'reconnect') { _src.close(); setTimeout(connectStoreSSE, 1500); return; }
        if (d.type === 'settings_update' && d.settings) {
          if (d.settings.storeName) {
            document.querySelectorAll('.js-store-name,[data-store-name]').forEach(function(el){ el.textContent = d.settings.storeName; });
            document.title = d.settings.storeName;
          }
          applyGlobalBg(d.settings);
          applyMusicSettings(d.settings);
        }
        if (d.type === 'reload') {
          fetch('/api/products').then(function(r){return r.json();}).then(function(j){
            if (j.settings && j.settings.storeName) document.title = j.settings.storeName;
            if (j.settings) { applyGlobalBg(j.settings); applyMusicSettings(j.settings); }
          }).catch(function(){});
        }
        if (d.type === 'maintenance' && d.on) {
          var _cm = d.msg && typeof d.msg === 'string' && d.msg.trim().length < 300
            && d.msg.indexOf('<') === -1 && d.msg.indexOf('{') === -1
            && d.msg.indexOf('function') === -1 && d.msg.indexOf('innerHTML') === -1
            && d.msg.indexOf("'") === -1
            ? d.msg.trim() : 'Sedang dalam maintenance.';
          document.body.innerHTML = '<div style="position:fixed;inset:0;background:#0a0a0f;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;color:#f0f0f0;font-size:.9rem;text-align:center;padding:2rem">' + esc(_cm) + '</div>';
        }
      } catch(ex){}
    };
    _src.onerror = function(){ _src.close(); setTimeout(connectStoreSSE, 5000); };
  } catch(ex){}
})();

<script>(function(){var v="?v="+Date.now();document.querySelectorAll("img[data-logo-img]").forEach(function(el){if(el.src&&el.src.indexOf("/media/logo")>-1)el.src=el.src.split("?")[0]+v;});var fav=document.querySelector("link[rel=icon]");if(fav&&fav.href&&fav.href.indexOf("/media/logo")>-1)fav.href=fav.href.split("?")[0]+v;})();

var _music = {
  playlist: [],
  idx: 0,
  muted: false,
  vol: 0.35,
  ready: false,
  panelOpen: false,
  fadeTimer: null,
  endBound: false,
  gesturePending: false
};

function initMusic() {
  try {
    _music.muted = localStorage.getItem('musicMuted') === '1';
    var sv = parseFloat(localStorage.getItem('musicVol'));
    if (!isNaN(sv) && sv >= 0 && sv <= 1) _music.vol = sv;
    var si = parseInt(localStorage.getItem('musicIdx'), 10);
    if (!isNaN(si) && si >= 0) _music.idx = si;
  } catch(e){}
  var volEl = document.getElementById('mpVol');
  if (volEl) volEl.value = Math.round(_music.vol * 100);
}

function applyMusicSettings(settings) {
  var player = document.getElementById('musicPlayer');
  var audio  = document.getElementById('bgMusic');
  if (!settings || !settings.musicUrl || !settings.musicEnabled) {
    if (player) player.style.display = 'none';
    return;
  }
  // Set atribut mobile penting via JS (backup selain atribut HTML)
  audio.playsInline = true;
  audio.setAttribute('playsinline', '');
  audio.setAttribute('webkit-playsinline', '');
  var urls = settings.musicUrl.split(',')
    .map(function(u){ return u.trim(); })
    .filter(Boolean)
    .map(function(u){
      return /^https?:\/\//i.test(u) ? u : location.origin + u;
    });
  if (!urls.length) { if (player) player.style.display = 'none'; return; }

  _music.playlist = urls;
  _music.idx = Math.min(_music.idx, urls.length - 1);
  _music.ready = true;
  // Loop hanya aktif jika single track (multi-track dihandle via 'ended' event)
  audio.loop = (urls.length === 1);

  var prevBtn = document.getElementById('mpPrev');
  var nextBtn = document.getElementById('mpNext');
  if (prevBtn) prevBtn.style.display = urls.length > 1 ? '' : 'none';
  if (nextBtn) nextBtn.style.display = urls.length > 1 ? '' : 'none';

  if (player) player.style.display = 'flex';

  _musicLoad(_music.idx, false);
  _musicUpdateBtn();
  _musicUpdateTitle();

  if (!_music.endBound) {
    _music.endBound = true;
    audio.addEventListener('ended', function() {
      if (_music.playlist.length > 1) {
        _music.idx = (_music.idx + 1) % _music.playlist.length;
        try { localStorage.setItem('musicIdx', _music.idx); } catch(e){}
        _musicLoad(_music.idx, true);
        _musicUpdateTitle();
      } else {
        audio.currentTime = 0;
        if (!_music.muted) audio.play().catch(function(){});
      }
    });
  }

  if (!_music.muted) _musicFadeIn();
}

function _musicLoad(idx, autoPlay) {
  var audio = document.getElementById('bgMusic');
  var url = _music.playlist[idx];
  // Atribut penting untuk iOS agar audio bisa diputar inline
  audio.playsInline = true;
  if (audio.src !== url) { audio.src = url; audio.load(); }
  audio.volume = _music.muted ? 0 : _music.vol;
  if (autoPlay && !_music.muted) _musicFadeIn();
}

function _musicFadeIn() {
  var audio = document.getElementById('bgMusic');
  if (!audio || !audio.src) return;
  clearInterval(_music.fadeTimer);
  audio.playsInline = true;
  audio.setAttribute('playsinline', '');
  // Langsung set volume target — tidak fade via setInterval karena di mobile
  // interval callback BUKAN bagian dari user gesture, sehingga play() di dalamnya diblokir
  audio.volume = _music.vol;
  var p = audio.play();
  if (p && p.catch) p.catch(function(e){
    console.warn('[music] Autoplay blocked:', e && e.name);
    _musicWaitForGesture();
  });
}

// Daftarkan satu kali listener gesture (touchstart / click) untuk resume di HP
function _musicWaitForGesture() {
  if (_music.gesturePending) return;
  _music.gesturePending = true;
  function onGesture() {
    _music.gesturePending = false;
    document.removeEventListener('touchstart', onGesture, true);
    document.removeEventListener('click', onGesture, true);
    if (!_music.muted && _music.ready) {
      var audio = document.getElementById('bgMusic');
      if (audio && audio.paused) _musicFadeIn();
    }
  }
  document.addEventListener('touchstart', onGesture, { capture: true, once: true, passive: true });
  document.addEventListener('click', onGesture, { capture: true, once: true });
}

function _musicFadeOut(cb) {
  var audio = document.getElementById('bgMusic');
  if (!audio) { if (cb) cb(); return; }
  clearInterval(_music.fadeTimer);
  _music.fadeTimer = setInterval(function() {
    if (audio.volume > 0.03) { audio.volume = Math.max(0, audio.volume - 0.04); }
    else { audio.volume = 0; audio.pause(); clearInterval(_music.fadeTimer); if (cb) cb(); }
  }, 35);
}

function toggleMusicPanel() {
  if (!_music.ready) { toggleMusic(); return; }
  var audio = document.getElementById('bgMusic');
  // KUNCI MOBILE: audio.play() harus dipanggil langsung dalam gesture handler (tap/click).
  // Kalau dipanggil lewat setTimeout atau nested function, browser mobile BLOKIR.
  // Jadi kita play() dulu synchronous di sini, baru urus panel setelahnya.
  if (audio && !_music.muted) {
    // Set semua atribut mobile sebelum play
    audio.playsInline = true;
    audio.setAttribute('playsinline', '');
    audio.setAttribute('webkit-playsinline', '');
    if (audio.paused) {
      // Pastikan src sudah ada
      if (!audio.src && _music.playlist && _music.playlist.length) {
        audio.src = _music.playlist[_music.idx] || _music.playlist[0];
        audio.load();
      }
      audio.volume = _music.vol;
      audio.play().catch(function(e){ console.warn('[music] play blocked:', e && e.name); });
    }
  }
  _music.panelOpen = !_music.panelOpen;
  var panel = document.getElementById('musicPanel');
  if (!panel) return;
  if (_music.panelOpen) panel.classList.add('open');
  else panel.classList.remove('open');
  _musicUpdateBtn();
}

function toggleMusic() {
  if (!_music.ready) return;
  _music.muted = !_music.muted;
  try { localStorage.setItem('musicMuted', _music.muted ? '1' : '0'); } catch(e){}
  if (_music.muted) {
    _musicFadeOut();
  } else {
    // Play langsung synchronous dalam gesture untuk mobile
    var audio = document.getElementById('bgMusic');
    if (audio) {
      audio.playsInline = true;
      audio.setAttribute('playsinline', '');
      if (!audio.src && _music.playlist && _music.playlist.length) {
        audio.src = _music.playlist[_music.idx] || _music.playlist[0];
        audio.load();
      }
      audio.volume = _music.vol;
      audio.play().catch(function(e){ console.warn('[music] play blocked:', e && e.name); });
    }
  }
  _musicUpdateBtn();
}

function musicNext() {
  if (!_music.playlist.length) return;
  var wasMuted = _music.muted;
  _musicFadeOut(function() {
    _music.idx = (_music.idx + 1) % _music.playlist.length;
    try { localStorage.setItem('musicIdx', _music.idx); } catch(e){}
    _musicLoad(_music.idx, false);
    _musicUpdateTitle();
    if (!wasMuted) _musicFadeIn();
  });
}

function musicPrev() {
  if (!_music.playlist.length) return;
  var wasMuted = _music.muted;
  _musicFadeOut(function() {
    _music.idx = (_music.idx - 1 + _music.playlist.length) % _music.playlist.length;
    try { localStorage.setItem('musicIdx', _music.idx); } catch(e){}
    _musicLoad(_music.idx, false);
    _musicUpdateTitle();
    if (!wasMuted) _musicFadeIn();
  });
}

function musicSetVol(val) {
  _music.vol = val / 100;
  try { localStorage.setItem('musicVol', String(_music.vol)); } catch(e){}
  var audio = document.getElementById('bgMusic');
  if (audio && !_music.muted) audio.volume = _music.vol;
}

function _musicUpdateBtn() {
  var btn = document.getElementById('musicBtn');
  if (!btn) return;
  if (_music.muted) btn.classList.remove('playing'); else btn.classList.add('playing');
  var pp = document.getElementById('mpPlayPause');
  if (pp) {
    if (_music.muted) {
      pp.title = 'Play';
      pp.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
    } else {
      pp.title = 'Pause';
      pp.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="4" x2="6" y2="20"/><line x1="18" y1="4" x2="18" y2="20"/></svg>';
    }
  }
}

function _musicUpdateTitle() {
  var el = document.getElementById('mpTitle');
  if (!el || !_music.playlist.length) return;
  var url = _music.playlist[_music.idx];
  var raw = url.split('?')[0].split('/').pop();
  var name = decodeURIComponent(raw).replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ') || ('Track ' + (_music.idx + 1));
  var num = _music.playlist.length > 1 ? (_music.idx + 1) + '/' + _music.playlist.length + ' · ' : '';
  el.textContent = '♪ ' + num + name;
  el.title = name;
}

document.addEventListener('click', function(e) {
  if (!_music.panelOpen) return;
  var player = document.getElementById('musicPlayer');
  if (player && !player.contains(e.target)) {
    _music.panelOpen = false;
    var panel = document.getElementById('musicPanel');
    if (panel) panel.classList.remove('open');
  }
});
</script>

<div id="musicPlayer">
  <div id="musicPanel">
    <div class="mp-title" id="mpTitle">&#9834; Musik</div>
    <div class="mp-controls">
      <button class="mp-nav" id="mpPrev" title="Sebelumnya" onclick="musicPrev()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="4" x2="5" y2="20"/></svg>
      </button>
      <button class="mp-nav" id="mpPlayPause" title="Pause" onclick="toggleMusic()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="4" x2="6" y2="20"/><line x1="18" y1="4" x2="18" y2="20"/></svg>
      </button>
      <button class="mp-nav" id="mpNext" title="Berikutnya" onclick="musicNext()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="4" x2="19" y2="20"/></svg>
      </button>
    </div>
    <div class="mp-vol-row">
      <span class="mp-vol-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></span>
      <input type="range" class="mp-vol-sl" id="mpVol" min="0" max="100" value="35" oninput="musicSetVol(this.value)">
    </div>
  </div>
  <button id="musicBtn" title="Musik" onclick="toggleMusicPanel()">
    <span class="mp-ico">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    </span>
    <span class="mp-eq"><span></span><span></span><span></span><span></span></span>
  </button>
</div>
<audio id="bgMusic" loop preload="none" playsinline webkit-playsinline x-webkit-airplay="allow"></audio>
<a href="/admin-panell" title="Admin Panel" style="position:fixed;bottom:14px;left:14px;z-index:40;width:38px;height:38px;border-radius:50%;background:rgba(33,33,33,.85);backdrop-filter:blur(6px);border:1px solid var(--line2,#3a3a3a);color:var(--em,#6366f1);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.35);text-decoration:none;font-size:15px;opacity:.75;transition:opacity .15s,transform .15s" aria-label="Admin Panel">🛡️</a>
</body>
