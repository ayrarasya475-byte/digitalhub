<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Profil — DigitalHub</title>
<link rel="icon" type="image/x-icon" href="/media/favicon.ico">
<link rel="icon" type="image/jpeg" href="/media/logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400..700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#181818;--bg1:#1a1a1a;--bg2:#212121;--line:#2E2E2E;--line2:#3a3a3a;
  --em:#6366f1;--em-rgb:99,102,241;--em2:#818cf8;--red:#f87171;--t1:#e5e5e5;--t2:#a0a0a0;--t3:#616161;
  --font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--t1);font-family:var(--font)}
  body{padding:1.1rem}
  .top{display:flex;align-items:center;gap:.8rem;padding:.5rem 0 1.2rem}
  .avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--em),var(--em2));display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700}
  .uname{font-size:1.05rem;font-weight:700}
  .balance-card{background:linear-gradient(135deg,var(--em),var(--em2));border-radius:14px;padding:1.1rem;margin-bottom:1.2rem}
  .balance-card .l{font-size:.7rem;color:rgba(255,255,255,.8)}
  .balance-card .v{font-size:1.5rem;font-weight:700;color:#fff;font-family:var(--mono);margin:.2rem 0 .7rem}
  .balance-card button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:.5rem 1rem;border-radius:999px;font-size:.75rem;font-family:var(--font)}
  h2{font-size:.85rem;color:var(--t2);margin:1.3rem 0 .6rem;text-transform:uppercase;letter-spacing:.05em;font-size:.68rem}
  .card{background:var(--bg1);border:1px solid var(--line2);border-radius:12px;padding:1rem}
  .inp{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:8px;padding:.65rem .8rem;color:var(--t1);font-family:var(--font);margin-bottom:.6rem;font-size:.85rem}
  .btn{background:var(--em);border:none;border-radius:8px;padding:.65rem 1.1rem;color:#fff;font-weight:700;font-size:.8rem;font-family:var(--font)}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--line)}
  .toggle-row:last-child{border-bottom:none}
  .toggle-row .l{font-size:.82rem}
  .toggle-row .s{font-size:.68rem;color:var(--t3)}
  .switch{position:relative;width:42px;height:24px;flex-shrink:0}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;cursor:pointer;inset:0;background:var(--bg2);border:1px solid var(--line2);border-radius:999px;transition:.2s}
  .slider:before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:var(--t2);border-radius:50%;transition:.2s}
  input:checked + .slider{background:rgba(var(--em-rgb),.3);border-color:var(--em)}
  input:checked + .slider:before{transform:translateX(18px);background:var(--em)}
  .msg{font-size:.72rem;margin-top:.5rem}
  .apikey-box{font-family:var(--mono);font-size:.7rem;background:var(--bg2);border:1px solid var(--line2);border-radius:8px;padding:.6rem .8rem;word-break:break-all;color:var(--em2)}
  .logout{width:100%;background:none;border:1px solid var(--red);color:var(--red);border-radius:8px;padding:.7rem;font-family:var(--font);font-size:.82rem;margin-top:1.5rem}
  .guest{text-align:center;padding:3rem 1rem}
  .guest a{display:inline-block;margin-top:1rem;background:var(--em);color:#fff;padding:.7rem 1.4rem;border-radius:999px;font-weight:700;font-size:.85rem}
</style>
</head>
<body>

<div id="guestView" class="guest" style="display:none">
  <p style="color:var(--t2)">Kamu belum login.</p>
  <a href="/login?returnUrl=/profil">Masuk / Daftar</a>
</div>

<div id="profileView" style="display:none">
  <div class="top">
    <div class="avatar" id="avatarInitial">?</div>
    <div><div class="uname" id="unameDisplay">-</div><div style="font-size:.72rem;color:var(--t3)">Pembeli DigitalHub</div></div>
  </div>

  <div class="balance-card">
    <div class="l">SALDO KAMU</div>
    <div class="v" id="balanceDisplay">Rp0</div>
    <button onclick="requestTopup()">+ Isi Saldo (chat admin)</button>
  </div>

  <h2>Akun</h2>
  <div class="card">
    <label style="font-size:.7rem;color:var(--t2)">Username</label>
    <input id="newUsername" class="inp" placeholder="Username">
    <button class="btn" id="saveNameBtn" style="width:100%;margin-bottom:1rem">Simpan Username</button>
    <label style="font-size:.7rem;color:var(--t2)">Ganti Password</label>
    <input id="oldPass" class="inp" type="password" placeholder="Password lama">
    <input id="newPass" class="inp" type="password" placeholder="Password baru (min 6 karakter)">
    <button class="btn" id="savePassBtn" style="width:100%">Ganti Password</button>
    <div class="msg" id="accMsg"></div>
  </div>

  <h2>Pengaturan Pribadi</h2>
  <div class="card">
    <div class="toggle-row">
      <div><div class="l">Iklan CPC</div><div class="s">Klik iklan buat dapat poin diskon (10 poin = Rp100)</div></div>
      <label class="switch"><input type="checkbox" id="adsToggle"><span class="slider"></span></label>
    </div>
  </div>

  <h2>API Key (buat chat, ulasan, OTP)</h2>
  <div class="card">
    <div class="apikey-box" id="apikeyBox">••••••••••••••••</div>
    <button class="btn" style="margin-top:.6rem;background:transparent;border:1px solid var(--line2);color:var(--t1)" onclick="toggleApikey()">Tampilkan / Sembunyikan</button>
  </div>

  <button class="logout" onclick="logout()">Keluar</button>
</div>

<script>
var TOKEN=localStorage.getItem('token');
var APIKEY_VISIBLE=false, REAL_APIKEY='';

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function api(path,opts){
  opts=opts||{}; opts.headers=opts.headers||{}; opts.headers['Content-Type']='application/json';
  if(TOKEN) opts.headers['Authorization']='Bearer '+TOKEN;
  return fetch(path,opts).then(function(r){return r.json();});
}

if(!TOKEN){
  document.getElementById('guestView').style.display='block';
} else {
  document.getElementById('profileView').style.display='block';
  loadProfile();
}

function loadProfile(){
  api('/api/user/me').then(function(j){
    if(!j.ok){ localStorage.removeItem('token'); location.reload(); return; }
    var u=j.user;
    document.getElementById('unameDisplay').textContent=u.username;
    document.getElementById('avatarInitial').textContent=u.username.charAt(0).toUpperCase();
    document.getElementById('balanceDisplay').textContent='Rp'+Number(u.balance||0).toLocaleString('id-ID');
    document.getElementById('newUsername').value=u.username;
    document.getElementById('adsToggle').checked = u.adsEnabled !== 0;
    REAL_APIKEY=u.apikey||'';
  });
}

document.getElementById('saveNameBtn').addEventListener('click',function(){
  var msg=document.getElementById('accMsg');
  msg.textContent='Fitur ganti username belum tersedia — hubungi admin lewat chat kalau perlu.';
  msg.style.color='var(--t3)';
});

document.getElementById('savePassBtn').addEventListener('click',function(){
  var oldPassword=document.getElementById('oldPass').value, newPassword=document.getElementById('newPass').value;
  var msg=document.getElementById('accMsg');
  if(!oldPassword||newPassword.length<6){ msg.style.color='var(--red)'; msg.textContent='Isi password lama & password baru (min 6 karakter).'; return; }
  api('/api/user/change-password',{method:'POST',body:JSON.stringify({oldPassword,newPassword})}).then(function(j){
    msg.style.color=j.ok?'var(--em)':'var(--red)'; msg.textContent=j.message||'';
    if(j.ok){ document.getElementById('oldPass').value=''; document.getElementById('newPass').value=''; }
  });
});

document.getElementById('adsToggle').addEventListener('change',function(){
  api('/api/user/settings',{method:'POST',body:JSON.stringify({adsEnabled:this.checked})}).catch(function(){});
});

function toggleApikey(){
  APIKEY_VISIBLE=!APIKEY_VISIBLE;
  document.getElementById('apikeyBox').textContent = APIKEY_VISIBLE ? (REAL_APIKEY||'-') : '••••••••••••••••';
}

function requestTopup(){
  var amount=prompt('Mau isi saldo berapa? (Rp)');
  if(!amount || isNaN(parseInt(amount))) return;
  api('/api/user/topup-request',{method:'POST',body:JSON.stringify({amount:parseInt(amount)})}).then(function(j){
    alert(j.ok ? 'Permintaan top-up terkirim! Admin akan konfirmasi lewat chat.' : (j.message||'Gagal.'));
  });
}

function logout(){
  localStorage.removeItem('token'); localStorage.removeItem('username'); localStorage.removeItem('userApiKey');
  location.href='/';
}
</script>

<nav class="dh-bottomnav" id="dhBottomNav">
  <a href="/" data-nav="dashboard">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"/></svg>
    <span>Beranda</span>
  </a>
  <a href="/toko" data-nav="toko">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l1.5-5h15L21 9"/><path d="M3 9v10a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V9"/><path d="M3 9h18M9 21v-5h6v5"/></svg>
    <span>Toko</span>
  </a>
  <a href="/ai" data-nav="ai">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3M12 18v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M3 12h3M18 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/><circle cx="12" cy="12" r="3.2"/></svg>
    <span>Asisten</span>
  </a>
  <a href="/ulasan" data-nav="testimoni">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 2 2.9 6.3L21 9l-4.6 4.5L17.5 21 12 17.8 6.5 21l1.1-7.5L3 9l6.1-.7z"/></svg>
    <span>Ulasan</span>
  </a>
  <a href="/profil" data-nav="profil">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.5"/><path d="M4.5 20c1.4-3.6 4.4-5.5 7.5-5.5s6.1 1.9 7.5 5.5"/></svg>
    <span>Akun</span>
  </a>
</nav>
<style>
.dh-bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;background:rgba(24,24,24,.94);backdrop-filter:blur(12px);border-top:1px solid #2E2E2E;padding:.35rem .3rem calc(.35rem + env(safe-area-inset-bottom))}
.dh-bottomnav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.22rem;color:#71717a;text-decoration:none;font-size:.6rem;font-family:'DM Sans',system-ui,sans-serif;padding:.4rem .2rem;border-radius:12px;transition:color .15s,background .15s}
.dh-bottomnav a svg{width:21px;height:21px;transition:transform .15s}
.dh-bottomnav a.active{color:#818cf8;background:rgba(99,102,241,.1)}
.dh-bottomnav a.active svg{transform:translateY(-1px)}
body{padding-bottom:68px !important}
</style>
<script>
(function(){
  var path=location.pathname;
  var map={'/':'dashboard','/toko':'toko','/ai':'ai','/ulasan':'testimoni','/profil':'profil'};
  var active=map[path];
  document.querySelectorAll('#dhBottomNav a').forEach(function(a){
    if(a.dataset.nav===active) a.classList.add('active');
  });
})();
</script>
</body>
</html>
